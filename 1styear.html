<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#07101a">
  <title>CD Study Hub</title>
  <style>
    :root{
      --bg-dark:#07101a;
      --neon-blue:#00d4ff;
      --neon-purple:#b66cff;
      --card-bg: rgba(255,255,255,0.04);
      --glass: rgba(255,255,255,0.06);
      --text:#e6eef8;
    }

        /* Reset + base */
    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,ui-sans-serif,system-ui,'Segoe UI',Roboto,Arial}
    html,body{height:100%;background:linear-gradient(180deg,#03060a 0%, #07101a 80%);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    a{color:inherit;text-decoration:none}

    /* Header / nav like sketch */
    nav{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;backdrop-filter:blur(6px);background:rgba(0,0,0,0.15);border-bottom:1px solid rgba(255,255,255,0.03);z-index:4}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));display:flex;align-items:center;justify-content:center;color:#021224;font-weight:800;box-shadow:0 8px 30px rgba(0,0,0,0.6)}
    .nav-links{display:flex;gap:18px;align-items:center;font-weight:600}
    .nav-links a{padding:8px 12px;border-radius:10px;white-space:nowrap}

    /* neon divider - visible between nav and hero */
    .divider{
      width:100%;
      height:4px;
      background:linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      opacity:0.9;
      z-index:3;
    }

    /* footer small */
    footer{margin-top: 210px;padding:16px 28px;color:rgba(230,238,248,0.6);font-size:13px;text-align: center;width: 100%;}


/* FLOATING SIDEBAR BUTTON (placed exactly like your picture) */
#menuBtn{
  position:absolute;
  left:28px;
  top:100px;
  padding:9px 13px;
  border-radius:10px;
  background: linear-gradient(145deg,var(--neon-blue),var(--neon-purple));
  color:white;
  font-size:20px;
  border:none;
  cursor:pointer;
}


/* SIDEBAR PANEL */
.sidebar{
  position:fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100%;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  padding:20px;
  box-shadow:-5px 0 20px rgba(0,0,0,0.4);
  transition:0.35s ease;
  z-index:50;
}

.sidebar.open{
  right:0;
}

/* Sidebar logo */
.sidebar .slogo{
  font-size:24px;
  font-weight:700;
  background: linear-gradient(to right,var(--neon-blue),var(--neon-purple));
  -webkit-background-clip:text;
  color:transparent;
  margin-bottom:30px;
}

/* Sidebar links/buttons */
.sidebar a{
  display:block;
  padding:12px 10px;
  color:var(--text-light);
  text-decoration:none;
  font-size:17px;
  margin-bottom:20px;
  border-radius:80px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.25s;
}

.sidebar a:hover{
  background:rgba(255,255,255,0.15);
}

    /* MAIN CONTENT */
  .main{
    text-align: center;
    padding:25px;
  }
  .main h1{
    font-size:60px;
    margin-bottom:20px;
    background:linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
    -webkit-background-clip:text;
    color:transparent;
  }

  .main h2{
    font-size: 100px;
  }

  .link-card{
  width:90%;
  max-width:400px;
  margin:20px auto;
  padding:20px;
  border-radius:12px;
  background:var(--card-bg);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 18px rgba(0,0,0,0.4);
  cursor:pointer;
  }
  .link-card a{
    color:var(--neon-blue);
    font-weight:700;
  }

    /* responsive: mobile layout matches your sketch narrow column */
    @media (max-width:980px){
      .hero-inner{grid-template-columns:1fr;gap:18px}
      .three-wrap{height:260px}
      .title{font-size:22px}
    }

    /* Mobile: ensure nav stays visible & swipable */
    @media (max-width:520px){
      nav{padding:12px 14px}
      .logo{width:45px;height:45px;border-radius: 10px;object-fit: cover;}
      .three-wrap{height:220px;}
      .title{font-size:22px}

      
      /* ENABLE SWIPE NAV LINKS on mobile */
      .nav-links{
        display:flex !important;
        gap:15px;
        overflow-x:auto;
        white-space:nowrap;
        padding-bottom:6px;
        -webkit-overflow-scrolling:touch;
        scrollbar-width:none;
      }
      .nav-links::-webkit-scrollbar{display:none}
    }

  #bgCanvas{
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  }

  @media(max-width:520px){
  .main-heading{
    font-size: 28px;
  }
  
  #menuBtn{
    left:15px;
    top:80px;
    margin-top:8px;
    display:block;
  }

  .sidebar .slogo{
    margin-bottom:18px;
  }

    footer{margin-top: 240px;padding:16px 28px;color:rgba(230,238,248,0.6);font-size:13px;text-align: center;width: 100%;}

}

</style>
</head>
<body>

      <!-- 3D background canvas -->
  <canvas id="bgCanvas"></canvas>

  <div class="page">
    <nav>
      <div class="brand">
        <div class="logo">CD</div>
        <div style="font-weight:800">CD Study Hub</div>
      </div>

      <div class="nav-links" role="navigation" aria-label="Main">
        <a href="index.html" style="background:var(--glass);padding:8px 10px;border-radius:8px">Home</a>
      </div>
    </nav>
    
    <!-- neon divider under nav -->
    <div class="divider" aria-hidden="true"></div>

    <!-- FLOATING MENU BUTTON -->
    <button id="menuBtn" class="menu-icon">☰</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="slogo">CD Study Hub</div>
  <div class="divider"></div>

  <a href="1styear.html">1st Year</a>
  <a href="1stsem.html">1st Semester</a>
  <a href="2ndsem.html">2nd Semester</a>
</div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <h1>1st Year</h1>

    <div id="first" class="link-card">
      <strong>1st Semester Syllabus Link</strong><br><br>
      <a href= "viewer.html?file=1stsem.pdf">Click Here</a>
    </div>

    <div id="second" class="link-card">
      <strong>2nd Semester Syllabus Link</strong><br><br>
      <a href="#">Click Here</a>
    </div>
  </div>

      <footer>© CD Study Hub — Made for students.</footer>


  <!-- Three.js + font/text helpers -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://threejs.org/examples/js/loaders/FontLoader.js"></script>
  <script src="https://threejs.org/examples/js/geometries/TextGeometry.js"></script>

  <script>

    //sidebar
    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");
    menuBtn.addEventListener("click", () => {
    sidebar.classList.toggle("open");
    });

    // ---------- 3D background with floating particles + 3D TEXT ("CD Study Hub") ----------
    (function(){
      const canvas = document.getElementById('bgCanvas');
      const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 8;

      // lights (soft neon)
      const amb = new THREE.AmbientLight(0xffffff, 0.55);
      scene.add(amb);

      const p1 = new THREE.PointLight(0x00d4ff, 1.1, 40);
      p1.position.set(5, 3, 8);
      scene.add(p1);

      const p2 = new THREE.PointLight(0xb66cff, 0.9, 40);
      p2.position.set(-6, -2, 6);
      scene.add(p2);

      // floating particle field
      const particleCount = 380;
      const positions = new Float32Array(particleCount * 3);
      const sizes = new Float32Array(particleCount);
      for (let i = 0; i < particleCount; i++) {
        positions[i*3] = (Math.random() - 0.5) * 40;
        positions[i*3 + 1] = (Math.random() - 0.5) * 14;
        positions[i*3 + 2] = (Math.random() - 0.5) * 40;
        sizes[i] = 0.03 + Math.random()*0.07;
      }
      const particlesGeo = new THREE.BufferGeometry();
      particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      particlesGeo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

      const particlesMat = new THREE.PointsMaterial({
        size: 0.06,
        color: 0x55e7ff,
        transparent: true,
        opacity: 0.85
      });
      const particles = new THREE.Points(particlesGeo, particlesMat);
      scene.add(particles);

      // subtle larger glow blobs (sprites)
      function makeGlow(color, scale){
        const spriteMap = new THREE.TextureLoader().load('data:image/svg+xml;utf8,' + encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128"><defs><radialGradient id="g" cx="50%" cy="50%"><stop offset="0%" stop-color="'+color+'" stop-opacity="1"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></radialGradient></defs><rect width="128" height="128" fill="url(#g)"/></svg>'
        ));
        const mat = new THREE.SpriteMaterial({ map: spriteMap, color: 0xffffff, transparent: true, opacity: 0.12 });
        const s = new THREE.Sprite(mat);
        s.scale.set(scale, scale, 1);
        return s;
      }
      const glow1 = makeGlow('#00d4ff', 14);
      glow1.position.set(7, 6, -6); scene.add(glow1);
      const glow2 = makeGlow('#b66cff', 11);
      glow2.position.set(-8, -4, -4); scene.add(glow2);

      let textRoot = new THREE.Group();
      scene.add(textRoot);

      // mouse parallax
      let mx = 0, my = 0;
      window.addEventListener('mousemove', (e) => {
        const nx = (e.clientX / window.innerWidth) - 0.5;
        const ny = (e.clientY / window.innerHeight) - 0.5;
        mx = nx; my = ny;
      });

      function resize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
      window.addEventListener('resize', resize);
      resize();

      // animation loop
      let t = 0;
      function animate() {
        t += 0.01;
        requestAnimationFrame(animate);

        // slow orbit of particle field
        particles.rotation.y = t * 0.06;
        particles.position.y = Math.sin(t * 0.4) * 0.3;

        // gently rotate the 3D text root and parallax it
        textRoot.rotation.y = Math.sin(t * 0.4) * 0.06 + mx * 0.25;
        textRoot.position.x += (mx * 2 - textRoot.position.x) * 0.02;
        textRoot.position.y += (-my * 1.2 - textRoot.position.y) * 0.02;

        // move glow sprites slightly
        glow1.position.x = 7 + Math.sin(t*0.7)*0.6;
        glow1.position.y = 6 + Math.cos(t*0.5)*0.5;
        glow2.position.x = -8 + Math.cos(t*0.9)*0.6;
        glow2.position.y = -4 + Math.sin(t*0.6)*0.4;

        // camera slight parallax
        camera.position.x += (mx*2.5 - camera.position.x) * 0.02;
        camera.position.y += (-my*1.2 - camera.position.y) * 0.02;
        camera.lookAt(0,0,0);

        renderer.render(scene, camera);
      }
      animate();

      // ensure canvas covers full screen style (hi-dpi)
      function styleCanvas() {
        canvas.style.position = 'fixed';
        canvas.style.left = 0;
        canvas.style.top = 0;
        canvas.style.width = '100%';
        canvas.style.height = '100%';
      }
      styleCanvas();
    })();

  canvas.style.pointerEvents = "none";

  </script>

</body>
</html>
